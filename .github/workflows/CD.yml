name: CD docker

on:
  workflow_run:
    workflows: ['CI docker']
    types:
      - completed

jobs:
  starts:
      runs-on: [self-hosted, be-fiverr-system]

      steps:
        # BƯỚC NÀY LÀ BẮT BUỘC để tạo folder _work và lấy file docker-compose.yml
        - name: Checkout mã nguồn
          uses: actions/checkout@v4 

        - name: Dọn dẹp (nếu cần)
          run: |
            sudo docker container stop con-be-fiverr-system || true
            sudo docker container rm con-be-fiverr-system || true

        - name: Kéo bản mới và chạy
          run: |
            docker compose pull
            docker compose up -d